# Example runtime configuration. Replace local test sources with remote subscription URLs for deployment.
urls:
  - "tv.m3u"
  - "sdyd.m3u"
  - "ipv6.m3u"

server:
  port: 7777
  source_timeout: "30s"
  source_cache_ttl: "1h"
  result_cache_ttl: "1m"
  server_read_timeout: "10s"
  server_write_timeout: "60s"
  server_idle_timeout: "120s"

channel-groups:
